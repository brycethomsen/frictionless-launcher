version: 2

project_name: Frictionless-Launcher

before:
  hooks:
    - go mod tidy
    - go generate ./...

# Split by OS (rather than one cross-compiled entry) because Fyne needs cgo,
# and cgo cross-compiling from a single host is fragile — especially GLFW's
# X11 dependency on Linux. Each id is built natively on its own OS's runner in
# CI (see .github/workflows/release.yml) via `goreleaser build --id <os>`,
# then the workflow packages the results itself — goreleaser's OSS `release`
# command has no way to skip rebuilding and use pre-built binaries instead
# (that's Pro-only), so archives/checksums/changelog/publish all happen as
# plain shell + `gh release create` in the workflow, not via `goreleaser
# release`. Linux/arm64 is intentionally not built — same as the Makefile's
# `linux`/`steamos` targets, which are amd64-only (Steam Deck is x86_64).
builds:
  - id: linux
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

  - id: darwin
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

  - id: windows
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}
      - -H windowsgui
    flags:
      - -trimpath

universal_binaries:
  - ids: [darwin]
    replace: true
    name_template: '{{ .ProjectName }}'
    hooks:
      post:
        - cmd: codesign -s - {{ .Path }}
          env:
            - GOOS=darwin
