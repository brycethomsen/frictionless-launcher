name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    # Windows runners default `run:` steps to pwsh, which mis-tokenizes
    # `-coverprofile=coverage.out` into two separate arguments. bash (via
    # Git Bash, always present on windows-latest) parses it correctly and
    # keeps behavior consistent across all three OSes.
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Windows Defender's real-time scanning makes Go/cgo builds dramatically
      # slower on windows-latest (every module file, every object file gets
      # scanned as it's written). Safe here — these are single-use, ephemeral
      # runner VMs, not a persistent machine.
      - name: Disable Windows Defender real-time scanning
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      # Fyne needs cgo + GLFW's X11 dependency to even compile on Linux,
      # let alone run — same packages release.yml's build-linux job installs.
      - name: Install Fyne Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

  dependabot-auto-merge:
    runs-on: ubuntu-latest
    needs: [test]
    # Only run on Dependabot PRs after all checks pass
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
