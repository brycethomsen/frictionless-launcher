name: Release

on:
  push:
    tags:
      - 'v*'
  # Lets this run on-demand from any branch (Actions tab, or
  # `gh workflow run release.yml --ref <branch>`) to test the full pipeline
  # without pushing a real tag. See the "Create GitHub Release" step below —
  # dispatch runs always create a draft, tag pushes always create the real thing.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install Fyne Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build linux binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: build --id linux --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install MinGW
        run: choco install mingw -y

      - name: Build windows binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: build --id windows --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-windows
          path: dist/*

  build-darwin:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build darwin binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: build --id darwin --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-darwin
          path: dist/*

  release:
    needs: [build-linux, build-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # goreleaser's `release` command has no OSS way to skip rebuilding and
      # package pre-built binaries instead (that's a Pro-only feature), so
      # this job packages the artifacts from the three native build jobs
      # directly rather than invoking goreleaser again.
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Package archives and checksums
        run: |
          set -euo pipefail
          mkdir -p release

          linux_bin=$(find dist -type f -name 'Frictionless-Launcher' -path '*linux*' | head -1)
          darwin_bin=$(find dist -type f -name 'Frictionless-Launcher' -path '*darwin_all*' | head -1)
          windows_bin=$(find dist -type f -name 'Frictionless-Launcher.exe' -path '*windows*' | head -1)

          if [ -z "$linux_bin" ] || [ -z "$darwin_bin" ] || [ -z "$windows_bin" ]; then
            echo "missing an expected build artifact:"
            echo "  linux:   ${linux_bin:-MISSING}"
            echo "  darwin:  ${darwin_bin:-MISSING}"
            echo "  windows: ${windows_bin:-MISSING}"
            find dist -type f
            exit 1
          fi

          tar -C "$(dirname "$linux_bin")" -czf release/Frictionless-Launcher_Linux_x86_64.tar.gz Frictionless-Launcher
          tar -C "$(dirname "$darwin_bin")" -czf release/Frictionless-Launcher_Darwin_universal.tar.gz Frictionless-Launcher
          (cd "$(dirname "$windows_bin")" && zip -j "$GITHUB_WORKSPACE/release/Frictionless-Launcher_Windows_x86_64.zip" Frictionless-Launcher.exe)

          cp README.md icon.ico release/

          cd release && sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            gh release create "$GITHUB_REF_NAME" release/* \
              --title "Frictionless Launcher $GITHUB_REF_NAME" \
              --generate-notes
          else
            # Rolling dev build: one draft release, always tagged "dev", whose
            # assets get replaced each run. Drafts are only visible to people
            # with write access to the repo — never public.
            gh release delete dev --cleanup-tag --yes || true
            gh release create dev release/* \
              --draft \
              --title "Dev build ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
              --notes "Automated dev build from commit $GITHUB_SHA on branch $GITHUB_REF_NAME. Draft only — not a public release." \
              --target "$GITHUB_SHA"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
